name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Type-check & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost/fake"
          DIRECT_URL:   "postgresql://fake:fake@localhost/fake"

      - name: TypeScript type check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

  fetchers:
    name: Smoke-test fetchers
    runs-on: ubuntu-latest
    # Only run on push to main (fetchers make real network calls)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost/fake"
          DIRECT_URL:   "postgresql://fake:fake@localhost/fake"

      - name: Test fetchers
        run: npm run test:fetchers
        timeout-minutes: 2
